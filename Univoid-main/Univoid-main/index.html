  <!-- 🔒 SECURITY BLOCKER: PREVENTS LOVABLE BADGE INJECTION (deferred to not block first paint) -->
  <script>
    (function () {
      // Defer to after first paint — badge can't exist before React mounts
      var run = function() {
        // 1. CSS Hide Force
        var style = document.createElement('style');
        style.textContent = '#lovable-badge, aside[aria-label="Edit with Lovable"], [class*="lovable-badge"] { display: none !important; opacity: 0 !important; pointer-events: none !important; width: 0 !important; height: 0 !important; }';
        document.head.appendChild(style);

        // 2. DOM Node Blocker (overrides)
        var originalAppend = Element.prototype.appendChild;
        var originalInsertBefore = Element.prototype.insertBefore;

        function isForbidden(node) {
          if (!node || !node.tagName) return false;
          if (node.id === 'lovable-badge' || (node.getAttribute && node.getAttribute('aria-label') === 'Edit with Lovable')) return true;
          if (node.tagName === 'ASIDE' && node.id && node.id.includes('lovable')) return true;
          return false;
        }

        Element.prototype.appendChild = function (node) {
          if (isForbidden(node)) return node;
          return originalAppend.call(this, node);
        };

        Element.prototype.insertBefore = function (node, ref) {
          if (isForbidden(node)) return node;
          return originalInsertBefore.call(this, node, ref);
        };

        // 3. MutationObserver
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(m) {
            m.addedNodes.forEach(function(node) {
              if (node.nodeType === 1 && isForbidden(node)) node.remove();
            });
          });
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
      };

      if ('requestIdleCallback' in window) {
        requestIdleCallback(run);
      } else {
        setTimeout(run, 100);
      }
    })();
  </script>
