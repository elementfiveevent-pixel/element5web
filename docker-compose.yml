version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: element5_postgres
    restart: always
    environment:
      POSTGRES_DB: element5_db
      POSTGRES_USER: element5_user
      POSTGRES_PASSWORD: element5_password_secure_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U element5_user -d element5_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: element5_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
    container_name: element5_backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://element5_user:element5_password_secure_2026@postgres:5432/element5_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=element5_jwt_secret_token_signature_2026_key
      - SUPABASE_URL=https://your-supabase-url.supabase.co
      - SUPABASE_ANON_KEY=your-supabase-anon-key
      - SUPABASE_SERVICE_ROLE_KEY=your-supabase-service-role-key
      - CLOUDINARY_CLOUD_NAME=your-cloudinary-name
      - CLOUDINARY_API_KEY=your-cloudinary-key
      - CLOUDINARY_API_SECRET=your-cloudinary-secret
      - PORT=4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules

  nginx:
    image: nginx:alpine
    container_name: element5_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
